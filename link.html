<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorenzo Mineo | Mes Liens</title>
    <!-- Importation des icônes FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2067E9;
            --bg-color: #141b2d;
            --text-color: #ffffff;
            --hover-color: #327be6;
            --radius: 15px; 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        /* Header Section */
        .profile {
            margin-bottom: 35px;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 15px;
            object-fit: cover;
            border: none; 
        }

        .profile h1 {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .profile p {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 20px;
        }

        /* Links Section */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link {
            background-color: transparent;
            color: var(--text-color);
            text-decoration: none;
            padding: 16px;
            border-radius: var(--radius);
            border: 2px solid var(--primary-color);
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            position: relative;
        }

        .link i {
            font-size: 1.2rem;
            width: 25px;
            text-align: center;
        }

        .link:hover {
            background-color: var(--primary-color);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(32, 103, 233, 0.3);
        }

        .highlight-link {
            background-color: var(--primary-color);
            border: 2px solid var(--primary-color);
        }
        
        .highlight-link:hover {
            background-color: var(--hover-color);
            border-color: var(--hover-color);
        }

        /* --- ANIMATION BOUNCE POUR PAYPAL --- */
        .bounce-animation {
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
            60% {
                transform: translateY(-5px);
            }
        }
        /* ----------------------------------- */

        .container {
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile">
            <img src="img/logo.png" alt="Lorenzo Mineo" class="profile-img">
            <h1>Lorenzo Mineo</h1>
            <p>Bienvenue sur mes réseaux sociaux</p>
        </div>

        <div class="links-container">
            
            <a href="https://photobylorenzo.github.io/accueil/link" target="_blank" class="link highlight-link">
                <i class="fa-solid fa-globe"></i>
                SiteWeb Portfolio
            </a>

            <a href="https://www.instagram.com/photobylorenzo/" target="_blank" class="link">
                <i class="fa-brands fa-instagram"></i>
                Instagram
            </a>

            <a href="#" target="_blank" class="link">
                <i class="fa-brands fa-tiktok"></i>
                TikTok
            </a>

            <a href="https://www.facebook.com/share/1LBHtGxtrZ/" target="_blank" class="link">
                <i class="fa-brands fa-facebook"></i>
                Facebook
            </a>

            <!-- Le bouton PayPal avec la classe bounce-animation -->
            <a href="https://www.paypal.com/paypalme/LorenzoMineo" target="_blank" class="link highlight-link bounce-animation">
                <i class="fa-brands fa-paypal"></i>
                Faire une donation
            </a>

        </div>
    </div>

</body>
</html>
